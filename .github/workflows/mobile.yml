name: Mobile
on:
 workflow_dispatch:

 workflow_call:
    inputs:
      buildFlags:
        required: false
        type: string

jobs:
  Mobile:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26] ##macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: 'main'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Setup Android NDK
        uses: nttld/setup-ndk@main
        id: setup-ndk
        if: startsWith(matrix.os, 'ubuntu')
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Restore cache
        uses: actions/cache@v4
        with:
          key: cache-build-${{ matrix.os }}
          path: |
            ~/.gradle
            .haxelib/
            /home/runner/haxelib/
            /Users/runner/haxelib/
            C:/hostedtoolcache/windows/haxe/4.3.6/x64/lib/
            ~/.haxelib/
            export/release/android/haxe/
            export/release/android/obj/
            export/release/ios/${{ env.PROJECT_NAME }}/haxe/
            export/release/ios/${{ env.PROJECT_NAME }}/obj/
            export\release\windows\haxe\
            export\release\windows\obj\
            .haxelib\
          restore-keys: |
            cache-build-${{ matrix.os }}

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: Configure Android
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile (Android)
        if: startsWith(matrix.os, 'ubuntu')
        run: haxelib run lime build android -final -ONLY_ARM64 -D ${{ inputs.buildFlags }}

      - name: Compile (iOS)
        if: startsWith(matrix.os, 'macos')
        run: haxelib run lime build ios -nosign -D ${{ inputs.buildFlags }}

      - name: Make Ipa
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install ldid
          cd build/release/ios/build/Release-iphoneos/JSEngine.app
          ldid -S../../../JSEngine/JSEngine.entitlements JSEngine
          cd ..
          mkdir Payload
          mv JSEngine.app Payload
          zip -r JSEngine.ipa Payload

      - name: Upload Artifact (Android)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@main
        with:
          name: androidBuild
          path: build/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Artifact (iOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@main
        with:
          name: iOSBuild
          path: build/release/ios/build/Release-iphoneos/*.ipa
          if-no-files-found: error

      - name: Clear Old Cache
        uses: actions/github-script@v7
        continue-on-error: true # Don't break the build if deletion fails
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-${{ matrix.os }}") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
            
      - name: Uploading new cache
        uses: actions/cache@v4
        with:
          # caching again since for some reason it doesnt work with the first post cache shit
          key: cache-build-${{ matrix.os }}
          path: |
            ~/.gradle
            .haxelib/
            /home/runner/haxelib/
            /Users/runner/haxelib/
            C:/hostedtoolcache/windows/haxe/4.3.6/x64/lib/
            ~/.haxelib/
            export/release/android/haxe/
            export/release/android/obj/
            export/release/ios/${{ env.PROJECT_NAME }}/haxe/
            export/release/ios/${{ env.PROJECT_NAME }}/obj/
            export\release\windows\haxe\
            export\release\windows\obj\
            .haxelib\
          restore-keys: |
            cache-build-${{ matrix.os }}
